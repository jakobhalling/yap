name: Auto-tag on push

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version and create tag
        id: tag
        run: |
          # Get the latest version tag, default to 0.0.0 if none exist
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi

          # Bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "Latest: $LATEST → Next: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
          echo "created=true" >> $GITHUB_OUTPUT

      - name: Trigger release workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "v${{ steps.tag.outputs.version }}"
