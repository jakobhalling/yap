name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

          (Get-Content pubspec.yaml) -replace 'version: .*', "version: $version+${{ github.run_number }}" | Set-Content pubspec.yaml

          $constants = "lib/utils/constants.dart"
          (Get-Content $constants) -replace "const String appVersion = '.*';", "const String appVersion = '$version';" | Set-Content $constants

          $issPath = "installer/yap.iss"
          (Get-Content $issPath) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content $issPath

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer/yap.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/installer/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE_B64: ${{ secrets.MACOS_CERTIFICATE_B64 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Decode certificate
          echo "$MACOS_CERTIFICATE_B64" | base64 --decode > /tmp/certificate.p12

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import /tmp/certificate.p12 -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          sed -i '' "s/version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          sed -i '' "s/const String appVersion = '.*';/const String appVersion = '$VERSION';/" lib/utils/constants.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Codesign app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Release/yap.app"
          # Deep sign all nested binaries and frameworks first, then the app itself
          codesign --deep --force --sign "Yap Developer" \
            --entitlements macos/Runner/Release.entitlements \
            "$APP_PATH"
          # Verify
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signing verified successfully"

      - name: Create DMG
        run: ./installer/create_dmg.sh "$VERSION"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/dmg/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Succeeded\",
              \"description\": \"**${REPO}** released **${REF}** successfully.\",
              \"color\": 3066993,
              \"fields\": [
                {\"name\": \"Version\", \"value\": \"[${REF}](${RELEASE_URL})\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${SHORT_SHA}\`](${COMMIT_URL})\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${ACTOR}\", \"inline\": true},
                {\"name\": \"Artifacts\", \"value\": \"Windows Installer (.exe) + macOS DMG (.dmg)\", \"inline\": true},
                {\"name\": \"Links\", \"value\": \"[Build Log](${RUN_URL}) | [Release](${RELEASE_URL})\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"Yap \u2022 Build & Release\"}
            }]
          }" "$DISCORD_WEBHOOK"

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Failed\",
              \"description\": \"**${REPO}** failed to build **${REF}**.\",
              \"color\": 15158332,
              \"fields\": [
                {\"name\": \"Version\", \"value\": \"${REF}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${SHORT_SHA}\`](${COMMIT_URL})\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${ACTOR}\", \"inline\": true},
                {\"name\": \"Links\", \"value\": \"[Build Log](${RUN_URL})\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"Yap \u2022 Build & Release\"}
            }]
          }" "$DISCORD_WEBHOOK"
