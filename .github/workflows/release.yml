name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

          (Get-Content pubspec.yaml) -replace 'version: .*', "version: $version+${{ github.run_number }}" | Set-Content pubspec.yaml

          $constants = "lib/utils/constants.dart"
          (Get-Content $constants) -replace "const String appVersion = '.*';", "const String appVersion = '$version';" | Set-Content $constants

          $issPath = "installer/yap.iss"
          (Get-Content $issPath) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content $issPath

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer/yap.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/installer/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          sed -i '' "s/version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          sed -i '' "s/const String appVersion = '.*';/const String appVersion = '$VERSION';/" lib/utils/constants.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/yap.app"
          DMG_NAME="Yap-${VERSION}-macOS.dmg"
          mkdir -p build/macos/dmg
          hdiutil create -volname "Yap" -srcfolder "$APP_PATH" -ov -format UDZO "build/macos/dmg/$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/dmg/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Succeeded\",
              \"description\": \"**${REPO}** released **${REF}** successfully.\",
              \"color\": 3066993,
              \"fields\": [
                {\"name\": \"Version\", \"value\": \"[${REF}](${RELEASE_URL})\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${SHORT_SHA}\`](${COMMIT_URL})\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${ACTOR}\", \"inline\": true},
                {\"name\": \"Artifacts\", \"value\": \"Windows Installer (.exe) + macOS DMG (.dmg)\", \"inline\": true},
                {\"name\": \"Links\", \"value\": \"[Build Log](${RUN_URL}) | [Release](${RELEASE_URL})\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"Yap \u2022 Build & Release\"}
            }]
          }" "$DISCORD_WEBHOOK"

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Failed\",
              \"description\": \"**${REPO}** failed to build **${REF}**.\",
              \"color\": 15158332,
              \"fields\": [
                {\"name\": \"Version\", \"value\": \"${REF}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${SHORT_SHA}\`](${COMMIT_URL})\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${ACTOR}\", \"inline\": true},
                {\"name\": \"Links\", \"value\": \"[Build Log](${RUN_URL})\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"Yap \u2022 Build & Release\"}
            }]
          }" "$DISCORD_WEBHOOK"
